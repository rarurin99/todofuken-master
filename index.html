<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>都道府県マスター Ver.4</title>
<style>
:root {
  --main:#08a6a0; --main2:#6ed2cf; --bg:#eefafa; --card:#ffffff;
  --text:#183236; --muted:#5f7479; --ok:#16a34a; --ng:#ef4444; --warn:#f59e0b;
}
* { box-sizing:border-box; }
body {
  margin:0; background:linear-gradient(180deg,#eefafa,#f8ffff); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}
header {
  position:sticky; top:0; z-index:20; background:linear-gradient(135deg,var(--main),var(--main2));
  color:white; padding:14px 18px; box-shadow:0 2px 14px rgba(0,0,0,.14);
}
h1 { margin:0; font-size:24px; }
main { max-width:1180px; margin:auto; padding:14px; }
.card {
  background:rgba(255,255,255,.94); border:1px solid rgba(0,0,0,.06); border-radius:20px;
  padding:16px; margin-bottom:14px; box-shadow:0 5px 22px rgba(0,80,80,.10);
}
.topGrid { display:grid; grid-template-columns:1.15fr .85fr; gap:14px; }
.controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
button, select {
  appearance:none; border:0; border-radius:14px; min-height:46px; padding:10px 14px;
  font-size:16px; font-weight:800; background:#e8f8f7; color:var(--text);
}
button.primary { background:var(--main); color:white; }
button.challenge { background:#fff7df; color:#8a5a00; border:1px solid #f5d47a; }
button.danger { background:#ffecec; color:#b91c1c; }
button.soft { background:#f0fbfb; }
button:active { transform:scale(.98); }
select { background:white; border:1px solid #d0e4e5; min-width:150px; }
#question { margin:14px 0 4px; font-size:30px; line-height:1.3; font-weight:900; }
#message { min-height:32px; font-size:18px; font-weight:900; }
.okText { color:var(--ok); } .ngText { color:var(--ng); }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:8px; }
.stat { background:#f5fbfb; border:1px solid #d9eeee; border-radius:16px; padding:10px; text-align:center; }
.stat b { display:block; font-size:24px; }
.stat span { font-size:12px; color:var(--muted); }
.progressWrap { margin-top:12px; }
.progressText { font-size:13px; color:var(--muted); margin-bottom:5px; }
.progressBar { height:12px; background:#e4f3f3; border-radius:99px; overflow:hidden; }
#progressFill { height:100%; width:0%; background:linear-gradient(90deg,#08a6a0,#86efac); transition:width .25s; }
.mapCard { position:relative; overflow:hidden; }
#map {
  width:100%; min-height:560px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#f8ffff,#effafa); border-radius:18px; border:1px solid #d9eeee;
  overflow:auto; padding:12px;
}
#map svg { width:min(100%, 880px); height:auto; max-height:82vh; }
.geolonia-svg-map .prefecture {
  fill:#ffffff; stroke:#53676b; stroke-width:.8; cursor:pointer;
  transition:fill .15s ease, filter .15s ease;
}
.geolonia-svg-map .prefecture:hover { fill:#bff1ee; filter:drop-shadow(0 2px 3px rgba(0,0,0,.25)); }
.geolonia-svg-map .prefecture.correct { fill:#86efac !important; }
.geolonia-svg-map .prefecture.wrong { fill:#fca5a5 !important; }
.geolonia-svg-map .prefecture.learn { fill:#fef3c7 !important; }
.resultPanel {
  position:absolute; right:26px; bottom:28px; width:min(330px, calc(100% - 52px));
  background:white; border-radius:22px; box-shadow:0 8px 28px rgba(0,0,0,.18);
  border:1px solid #d9eeee; padding:18px; text-align:center; display:none;
}
.resultPanel.show { display:block; }
.resultPanel h2 { margin:0 0 8px; font-size:26px; }
.resultPanel .big { font-size:34px; font-weight:900; margin:8px 0; }
.legend { display:flex; gap:12px; flex-wrap:wrap; font-size:14px; color:var(--muted); margin-bottom:8px; }
.dot { display:inline-block; width:14px; height:14px; border-radius:50%; vertical-align:-2px; margin-right:4px; }
.dot.ok { background:#86efac; } .dot.ng { background:#fca5a5; } .dot.learn { background:#fef3c7; border:1px solid #d6a900; }
.list { display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:8px; }
.chip { padding:9px 10px; background:#f5fbfb; border:1px solid #e0eeee; border-radius:13px; font-size:14px; }
.small { color:var(--muted); font-size:13px; line-height:1.6; }
.loading { font-weight:900; color:var(--muted); padding:20px; }
.modal {
  position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.45);
  display:none; align-items:center; justify-content:center; padding:18px;
}
.modal.show { display:flex; }
.modalInner {
  width:min(520px,100%); background:white; border-radius:26px; padding:26px;
  text-align:center; box-shadow:0 18px 60px rgba(0,0,0,.3);
}
.modalInner h2 { font-size:34px; margin:0 0 10px; }
.modalScore { font-size:44px; font-weight:900; color:var(--main); margin:8px 0; }
.badge {
  display:inline-block; padding:8px 12px; border-radius:999px; background:#fff3c4;
  color:#7a4f00; font-weight:900; margin:5px;
}
.confetti {
  position:fixed; width:10px; height:10px; top:-20px; z-index:60; pointer-events:none;
  animation:fall 1.8s linear forwards;
}
@keyframes fall {
  to { transform:translateY(110vh) rotate(720deg); opacity:.9; }
}
@media(max-width:850px) {
  main { padding:10px; } .topGrid { grid-template-columns:1fr; } .stats { grid-template-columns:repeat(2,1fr); }
  #question { font-size:25px; } #map { min-height:460px; justify-content:flex-start; }
  #map svg { min-width:620px; } .resultPanel { position:static; width:100%; margin-top:12px; }
}
</style>
</head>
<body>
<header><h1>👑 都道府県マスター Ver.4</h1></header>
<main>
  <section class="card topGrid">
    <div>
      <div class="controls">
        <select id="region">
          <option>全国</option><option>北海道</option><option>東北</option><option>関東</option>
          <option>中部</option><option>近畿</option><option>中国</option><option>四国</option><option>九州・沖縄</option>
        </select>
        <button class="primary" id="startBtn">🎮 クイズ</button>
        <button class="challenge" id="tenBtn">🏅 10問</button>
        <button class="challenge" id="allBtn">👑 47県制覇</button>
        <button class="soft" id="learnBtn">📍 学習</button>
        <button class="soft" id="weakBtn">🧠 苦手</button>
        <button class="danger" id="resetBtn">記録リセット</button>
      </div>
      <div id="question">「クイズ」を押してね</div>
      <div id="message">県の形そのものをクリックできます。</div>
      <div class="progressWrap">
        <div class="progressText" id="progressText">進み具合：未開始</div>
        <div class="progressBar"><div id="progressFill"></div></div>
      </div>
    </div>
    <div>
      <div class="stats">
        <div class="stat"><b id="correct">0</b><span>正解</span></div>
        <div class="stat"><b id="total">0</b><span>問題</span></div>
        <div class="stat"><b id="rate">0%</b><span>正答率</span></div>
        <div class="stat"><b id="streak">0</b><span>連続正解</span></div>
      </div>
      <div class="stats" style="grid-template-columns:repeat(3,1fr);">
        <div class="stat"><b id="weakCount">0</b><span>苦手県</span></div>
        <div class="stat"><b id="best10">-</b><span>10問ベスト</span></div>
        <div class="stat"><b id="best47">-</b><span>47県ベスト</span></div>
      </div>
      <p class="small">10問・47県制覇では終了時に結果が出ます。</p>
    </div>
  </section>

  <section class="card mapCard">
    <div class="legend">
      <span><i class="dot ok"></i>正解</span>
      <span><i class="dot ng"></i>不正解</span>
      <span><i class="dot learn"></i>学習モードで選択中</span>
    </div>
    <div id="map"><div class="loading">地図を読み込み中...</div></div>
    <div class="resultPanel" id="resultPanel">
      <h2 id="resultTitle">正解！</h2>
      <div id="resultSub">ここは</div>
      <div class="big" id="resultName">愛媛県</div>
      <div id="resultInfo">四国／県庁所在地：松山市</div>
      <button class="primary" id="nextBtn" style="margin-top:14px;">次の問題へ</button>
    </div>
  </section>

  <section class="card">
    <p class="small">使用地図：Geolonia Japanese Prefectures SVG。都道府県ごとのSVG要素をクリック判定に使っています。</p>
    <div class="list" id="prefList"></div>
  </section>
</main>

<div class="modal" id="finishModal">
  <div class="modalInner">
    <h2 id="finishTitle">チャレンジ終了！</h2>
    <div class="modalScore" id="finishScore">10/10</div>
    <div id="finishText">すごい！</div>
    <div id="finishBadges"></div>
    <button class="primary" id="closeFinish" style="margin-top:16px;">閉じる</button>
  </div>
</div>

<script>
const PREFS = {"1": ["北海道", "北海道", "札幌市", "ほっかいどう"], "2": ["青森県", "東北", "青森市", "あおもりけん"], "3": ["岩手県", "東北", "盛岡市", "いわてけん"], "4": ["宮城県", "東北", "仙台市", "みやぎけん"], "5": ["秋田県", "東北", "秋田市", "あきたけん"], "6": ["山形県", "東北", "山形市", "やまがたけん"], "7": ["福島県", "東北", "福島市", "ふくしまけん"], "8": ["茨城県", "関東", "水戸市", "いばらきけん"], "9": ["栃木県", "関東", "宇都宮市", "とちぎけん"], "10": ["群馬県", "関東", "前橋市", "ぐんまけん"], "11": ["埼玉県", "関東", "さいたま市", "さいたまけん"], "12": ["千葉県", "関東", "千葉市", "ちばけん"], "13": ["東京都", "関東", "新宿区", "とうきょうと"], "14": ["神奈川県", "関東", "横浜市", "かながわけん"], "15": ["新潟県", "中部", "新潟市", "にいがたけん"], "16": ["富山県", "中部", "富山市", "とやまけん"], "17": ["石川県", "中部", "金沢市", "いしかわけん"], "18": ["福井県", "中部", "福井市", "ふくいけん"], "19": ["山梨県", "中部", "甲府市", "やまなしけん"], "20": ["長野県", "中部", "長野市", "ながのけん"], "21": ["岐阜県", "中部", "岐阜市", "ぎふけん"], "22": ["静岡県", "中部", "静岡市", "しずおかけん"], "23": ["愛知県", "中部", "名古屋市", "あいちけん"], "24": ["三重県", "近畿", "津市", "みえけん"], "25": ["滋賀県", "近畿", "大津市", "しがけん"], "26": ["京都府", "近畿", "京都市", "きょうとふ"], "27": ["大阪府", "近畿", "大阪市", "おおさかふ"], "28": ["兵庫県", "近畿", "神戸市", "ひょうごけん"], "29": ["奈良県", "近畿", "奈良市", "ならけん"], "30": ["和歌山県", "近畿", "和歌山市", "わかやまけん"], "31": ["鳥取県", "中国", "鳥取市", "とっとりけん"], "32": ["島根県", "中国", "松江市", "しまねけん"], "33": ["岡山県", "中国", "岡山市", "おかやまけん"], "34": ["広島県", "中国", "広島市", "ひろしまけん"], "35": ["山口県", "中国", "山口市", "やまぐちけん"], "36": ["徳島県", "四国", "徳島市", "とくしまけん"], "37": ["香川県", "四国", "高松市", "かがわけん"], "38": ["愛媛県", "四国", "松山市", "えひめけん"], "39": ["高知県", "四国", "高知市", "こうちけん"], "40": ["福岡県", "九州・沖縄", "福岡市", "ふくおかけん"], "41": ["佐賀県", "九州・沖縄", "佐賀市", "さがけん"], "42": ["長崎県", "九州・沖縄", "長崎市", "ながさきけん"], "43": ["熊本県", "九州・沖縄", "熊本市", "くまもとけん"], "44": ["大分県", "九州・沖縄", "大分市", "おおいたけん"], "45": ["宮崎県", "九州・沖縄", "宮崎市", "みやざきけん"], "46": ["鹿児島県", "九州・沖縄", "鹿児島市", "かごしまけん"], "47": ["沖縄県", "九州・沖縄", "那覇市", "おきなわけん"]};
const MAP_URL = "https://cdn.jsdelivr.net/gh/geolonia/japanese-prefectures@master/map-full.svg";

let mode = "home";
let currentCode = null;
let used = new Set();
let correct = Number(localStorage.getItem("tdfk4_correct") || 0);
let total = Number(localStorage.getItem("tdfk4_total") || 0);
let weak = new Set(JSON.parse(localStorage.getItem("tdfk4_weak") || "[]"));
let streak = Number(localStorage.getItem("tdfk4_streak") || 0);
let bestStreak = Number(localStorage.getItem("tdfk4_bestStreak") || 0);
let best10 = localStorage.getItem("tdfk4_best10") || "";
let best47 = localStorage.getItem("tdfk4_best47") || "";
let mapReady = false;

let challengeActive = false;
let challengeSize = 0;
let challengeAnswered = 0;
let challengeCorrect = 0;
let challengePool = [];

const question = document.getElementById("question");
const message = document.getElementById("message");
const resultPanel = document.getElementById("resultPanel");

function save() {
  localStorage.setItem("tdfk4_correct", String(correct));
  localStorage.setItem("tdfk4_total", String(total));
  localStorage.setItem("tdfk4_weak", JSON.stringify(Array.from(weak)));
  localStorage.setItem("tdfk4_streak", String(streak));
  localStorage.setItem("tdfk4_bestStreak", String(bestStreak));
  if (best10) localStorage.setItem("tdfk4_best10", best10);
  if (best47) localStorage.setItem("tdfk4_best47", best47);
}

function updateStats() {
  document.getElementById("correct").textContent = correct;
  document.getElementById("total").textContent = total;
  document.getElementById("rate").textContent = total ? Math.round(correct / total * 100) + "%" : "0%";
  document.getElementById("weakCount").textContent = weak.size;
  document.getElementById("streak").textContent = streak;
  document.getElementById("best10").textContent = best10 || "-";
  document.getElementById("best47").textContent = best47 || "-";
}

function updateProgress() {
  if (!challengeActive) {
    document.getElementById("progressText").textContent = "進み具合：通常モード";
    document.getElementById("progressFill").style.width = "0%";
    return;
  }
  const pct = challengeSize ? Math.round(challengeAnswered / challengeSize * 100) : 0;
  document.getElementById("progressText").textContent =
    "進み具合：" + challengeAnswered + " / " + challengeSize + "問（正解 " + challengeCorrect + "）";
  document.getElementById("progressFill").style.width = pct + "%";
}

function codeOf(el) {
  return String(Number(el.dataset.code || el.getAttribute("data-code")));
}
function allPrefEls() {
  return Array.from(document.querySelectorAll(".geolonia-svg-map .prefecture"));
}
function clearMarks(keepAnswers=false) {
  allPrefEls().forEach(el => {
    el.classList.remove("learn");
    if (!keepAnswers) el.classList.remove("correct", "wrong");
  });
}
function getBasePool() {
  let entries = Object.entries(PREFS);
  const selected = document.getElementById("region").value;
  if (mode === "weak") entries = entries.filter(([code]) => weak.has(code));
  else if (selected !== "全国") entries = entries.filter(([code, data]) => data[1] === selected);
  return entries.map(([code]) => code);
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function startChallenge(size) {
  if (!mapReady) {
    message.textContent = "地図を読み込み中です。少し待ってください。";
    return;
  }
  mode = size === 47 ? "challenge47" : "challenge10";
  challengeActive = true;
  challengeSize = size;
  challengeAnswered = 0;
  challengeCorrect = 0;
  used = new Set();
  clearMarks();
  resultPanel.classList.remove("show");
  let base = getBasePool();
  if (size === 47) base = Object.keys(PREFS);
  challengePool = shuffle(base).slice(0, Math.min(size, base.length));
  challengeSize = challengePool.length;
  updateProgress();
  pickQuestion();
}
function pickQuestion() {
  if (!mapReady) {
    message.textContent = "地図を読み込み中です。少し待ってください。";
    return;
  }
  resultPanel.classList.remove("show");
  clearMarks(true);

  let pool;
  if (challengeActive) {
    pool = challengePool.filter(code => !used.has(code));
    if (!pool.length) {
      finishChallenge();
      return;
    }
  } else {
    pool = getBasePool();
    if (!pool.length) {
      currentCode = null;
      question.textContent = mode === "weak" ? "苦手県はまだありません" : "問題がありません";
      message.textContent = mode === "weak" ? "間違えた県がここにたまります。" : "";
      return;
    }
    let remaining = pool.filter(code => !used.has(code));
    if (!remaining.length) {
      used = new Set();
      remaining = pool;
    }
    pool = remaining;
  }

  currentCode = pool[Math.floor(Math.random() * pool.length)];
  used.add(currentCode);
  const data = PREFS[currentCode];
  question.textContent = "「" + data[0] + "」はどこ？";
  message.textContent = "ヒント：地方は「" + data[1] + "」／県庁所在地：" + data[2];
  message.className = "";
}
function showResult(isCorrect, clickedCode) {
  const clicked = PREFS[clickedCode];
  const answer = PREFS[currentCode];
  document.getElementById("resultTitle").textContent = isCorrect ? "✨ 正解！" : "❌ まちがい";
  document.getElementById("resultTitle").className = isCorrect ? "okText" : "ngText";
  document.getElementById("resultSub").textContent = isCorrect ? "ここは" : "ここは「" + clicked[0] + "」。正解は";
  document.getElementById("resultName").textContent = answer[0] + "（" + answer[3] + "）";
  document.getElementById("resultInfo").textContent = answer[1] + "／県庁所在地：" + answer[2];
  resultPanel.classList.add("show");
}
function answer(code, el) {
  if (mode === "learn") {
    resultPanel.classList.remove("show");
    clearMarks();
    el.classList.add("learn");
    const data = PREFS[code];
    question.textContent = data[0] + "（" + data[3] + "）";
    message.textContent = data[1] + "／県庁所在地：" + data[2];
    message.className = "";
    return;
  }
  if (!currentCode) {
    question.textContent = "先にクイズを始めてね";
    return;
  }
  total += 1;
  if (challengeActive) challengeAnswered += 1;

  const isCorrect = code === currentCode;
  if (isCorrect) {
    correct += 1;
    if (challengeActive) challengeCorrect += 1;
    streak += 1;
    if (streak > bestStreak) bestStreak = streak;
    weak.delete(code);
    el.classList.add("correct");
    message.textContent = "○ 正解！ 連続正解 " + streak + "！";
    message.className = "okText";
  } else {
    streak = 0;
    weak.add(currentCode);
    el.classList.add("wrong");
    const answerEl = document.querySelector('.geolonia-svg-map .prefecture[data-code="' + Number(currentCode) + '"]');
    if (answerEl) answerEl.classList.add("correct");
    message.textContent = "× ここは「" + PREFS[code][0] + "」。正解は「" + PREFS[currentCode][0] + "」";
    message.className = "ngText";
  }
  save();
  updateStats();
  updateProgress();
  showResult(isCorrect, code);
  if (challengeActive && challengeAnswered >= challengeSize) {
    setTimeout(finishChallenge, 850);
  }
}
function finishChallenge() {
  if (!challengeActive) return;
  const scoreText = challengeCorrect + " / " + challengeSize;
  const pct = Math.round(challengeCorrect / challengeSize * 100);
  if (challengeSize === 10) {
    const prev = best10 ? Number(best10.split("/")[0]) : -1;
    if (challengeCorrect > prev) best10 = scoreText;
  }
  if (challengeSize === 47) {
    const prev = best47 ? Number(best47.split("/")[0]) : -1;
    if (challengeCorrect > prev) best47 = scoreText;
  }
  save();
  updateStats();
  document.getElementById("finishTitle").textContent =
    challengeSize === 47 ? "👑 47県制覇チャレンジ終了！" : "🏅 10問チャレンジ終了！";
  document.getElementById("finishScore").textContent = scoreText;
  let text = pct === 100 ? "満点！すごい！" : pct >= 80 ? "かなり良い感じ！" : pct >= 60 ? "あと少し！" : "苦手県を復習しよう！";
  document.getElementById("finishText").textContent = text + "（正答率 " + pct + "%）";
  const badges = [];
  if (pct === 100) badges.push("🏆 パーフェクト");
  if (challengeSize === 47 && pct >= 80) badges.push("🗾 全国マスター");
  if (streak >= 10) badges.push("🔥 連続正解 " + streak);
  document.getElementById("finishBadges").innerHTML = badges.map(b => '<span class="badge">'+b+'</span>').join("");
  document.getElementById("finishModal").classList.add("show");
  confetti();
  challengeActive = false;
  updateProgress();
}
function confetti() {
  const colors = ["#08a6a0","#86efac","#facc15","#fb7185","#60a5fa"];
  for (let i=0; i<70; i++) {
    const d = document.createElement("div");
    d.className = "confetti";
    d.style.left = Math.random()*100 + "vw";
    d.style.background = colors[Math.floor(Math.random()*colors.length)];
    d.style.animationDelay = Math.random()*0.4 + "s";
    d.style.transform = "rotate(" + Math.random()*360 + "deg)";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 2300);
  }
}
async function loadMap() {
  try {
    const res = await fetch(MAP_URL);
    if (!res.ok) throw new Error("map fetch failed");
    const svg = await res.text();
    document.getElementById("map").innerHTML = svg;
    allPrefEls().forEach(el => {
      const code = codeOf(el);
      if (!PREFS[code]) return;
      el.setAttribute("tabindex", "0");
      el.setAttribute("role", "button");
      el.setAttribute("aria-label", PREFS[code][0]);
      el.addEventListener("click", () => answer(code, el));
      el.addEventListener("keydown", ev => {
        if (ev.key === "Enter" || ev.key === " ") {
          ev.preventDefault();
          answer(code, el);
        }
      });
    });
    mapReady = true;
    message.textContent = "準備できました。県の形をクリックできます。";
  } catch (e) {
    document.getElementById("map").innerHTML = '<div class="loading">地図の読み込みに失敗しました。ネット接続を確認して、再読み込みしてください。</div>';
  }
}
Object.entries(PREFS).forEach(([code, data]) => {
  const chip = document.createElement("div");
  chip.className = "chip";
  chip.textContent = data[0] + "｜" + data[2];
  document.getElementById("prefList").appendChild(chip);
});
document.getElementById("startBtn").addEventListener("click", () => {
  mode = "quiz"; challengeActive = false; used = new Set(); message.className = ""; clearMarks(); updateProgress(); pickQuestion();
});
document.getElementById("tenBtn").addEventListener("click", () => startChallenge(10));
document.getElementById("allBtn").addEventListener("click", () => startChallenge(47));
document.getElementById("learnBtn").addEventListener("click", () => {
  mode = "learn"; challengeActive = false; currentCode = null; resultPanel.classList.remove("show"); clearMarks(); updateProgress();
  question.textContent = "地図の県をクリックして確認";
  message.textContent = "学習モードです。県そのものをクリックしてね。";
  message.className = "";
});
document.getElementById("weakBtn").addEventListener("click", () => {
  mode = "weak"; challengeActive = false; used = new Set(); message.className = ""; clearMarks(); updateProgress(); pickQuestion();
});
document.getElementById("nextBtn").addEventListener("click", pickQuestion);
document.getElementById("region").addEventListener("change", () => {
  if (mode !== "learn") { mode = "quiz"; challengeActive = false; used = new Set(); message.className = ""; clearMarks(); updateProgress(); pickQuestion(); }
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("記録を消しますか？")) {
    correct = 0; total = 0; weak = new Set(); used = new Set(); streak = 0; bestStreak = 0; best10 = ""; best47 = ""; challengeActive = false;
    localStorage.removeItem("tdfk4_best10"); localStorage.removeItem("tdfk4_best47");
    save(); updateStats(); updateProgress(); clearMarks(); resultPanel.classList.remove("show");
    question.textContent = "記録をリセットしました"; message.textContent = ""; message.className = "";
  }
});
document.getElementById("closeFinish").addEventListener("click", () => {
  document.getElementById("finishModal").classList.remove("show");
  resultPanel.classList.remove("show");
});
updateStats();
updateProgress();
loadMap();
</script>
</body>
</html>
