<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>都道府県マスター</title>
<style>
body {
  margin:0;
  background:#f4fbfb;
  color:#20373a;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}
header {
  background:linear-gradient(135deg,#20a7a2,#6bc8c4);
  color:white;
  padding:14px 16px;
  position:sticky;
  top:0;
  z-index:10;
}
h1 { margin:0; font-size:22px; }
main { max-width:1120px; margin:auto; padding:10px; }
.card {
  background:white;
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 18px rgba(20,80,80,.10);
}
.buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
button, select {
  font-size:16px;
  border:0;
  border-radius:14px;
  padding:12px;
  background:#eaf8f7;
  color:#20373a;
  font-weight:700;
  min-height:46px;
}
button.primary { background:#20a7a2; color:white; }
button.danger { background:#ffecec; color:#a62121; }
.row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
select { background:white; border:1px solid #cfe1e1; }
#question { font-size:25px; font-weight:900; margin:10px 0 4px; line-height:1.35; }
#message { min-height:30px; font-size:18px; font-weight:900; }
.ok { color:#21a65b; }
.ng { color:#e34c4c; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:8px; }
.stat { background:#f5fbfb; border-radius:14px; text-align:center; padding:9px; }
.stat b { display:block; font-size:20px; }
.stat span { font-size:12px; color:#667; }
.mapShell {
  overflow:auto;
  background:white;
  border-radius:18px;
  border:1px solid #d7e6e6;
  box-shadow:0 4px 18px rgba(20,80,80,.10);
  margin-bottom:12px;
}
.map { position:relative; min-width:760px; }
.map img { width:100%; display:block; user-select:none; -webkit-user-drag:none; }
.pin {
  position:absolute;
  transform:translate(-50%,-50%);
  width:18px;
  height:18px;
  border-radius:50%;
  padding:0;
  z-index:5;
  background:rgba(32,167,162,.55);
  border:2px solid rgba(0,0,0,.45);
  box-shadow:0 1px 4px rgba(0,0,0,.25);
}
.pin::after {
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:34px;
  height:34px;
  border-radius:50%;
}
.pin.hit { background:rgba(33,166,91,.95); border-color:#127a3d; }
.pin.miss { background:rgba(227,76,76,.95); border-color:#a62020; }
.pin.learn { background:rgba(244,180,0,.95); border-color:#9a7200; }
.label {
  display:none;
  position:absolute;
  left:14px;
  top:-13px;
  white-space:nowrap;
  background:white;
  border:1px solid #9eb0b2;
  border-radius:8px;
  padding:2px 6px;
  font-size:13px;
  box-shadow:0 1px 5px rgba(0,0,0,.18);
}
.showLabels .label { display:block; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
.chip { background:#f5fbfb; padding:8px 10px; border-radius:12px; font-size:14px; }
.small { color:#667; font-size:13px; line-height:1.6; }
@media(max-width:760px) {
  .buttons { grid-template-columns:repeat(2,1fr); }
  .stats { grid-template-columns:repeat(2,1fr); }
  #question { font-size:22px; }
  .map { min-width:760px; }
  .pin { width:20px; height:20px; }
  .pin::after { width:40px; height:40px; }
}
</style>
</head>
<body>
<header><h1>🏯 都道府県マスター</h1></header>
<main>
<section class="card">
  <div class="buttons">
    <button class="primary" id="startBtn">🎮 クイズ</button>
    <button id="learnBtn">📍 学習</button>
    <button id="weakBtn">🧠 苦手</button>
    <button id="labelsBtn">👀 答え</button>
  </div>
</section>

<section class="card">
  <div class="row">
    <select id="region">
      <option>全国</option>
      <option>北海道</option>
      <option>東北</option>
      <option>関東</option>
      <option>中部</option>
      <option>近畿</option>
      <option>中国</option>
      <option>四国</option>
      <option>九州・沖縄</option>
    </select>
    <button id="nextBtn">次の問題</button>
    <button class="danger" id="resetBtn">記録リセット</button>
  </div>
  <div id="question">「クイズ」を押してね</div>
  <div id="message"></div>
  <div class="stats">
    <div class="stat"><b id="correct">0</b><span>正解</span></div>
    <div class="stat"><b id="total">0</b><span>問題</span></div>
    <div class="stat"><b id="rate">0%</b><span>正答率</span></div>
    <div class="stat"><b id="weakCount">0</b><span>苦手県</span></div>
  </div>
</section>

<section class="mapShell">
  <div class="map" id="map">
    <img src="map.jpeg" alt="日本の白地図">
  </div>
</section>

<section class="card">
  <p class="small">丸は小さくしましたが、タップ判定は少し広めにしています。答えボタンで県名を表示できます。</p>
  <div class="grid" id="prefList"></div>
</section>
</main>

<script>
const prefs = [["北海道", "北海道", "札幌市", 73.5, 13.7], ["青森県", "東北", "青森市", 64.9, 30.3], ["岩手県", "東北", "盛岡市", 69.5, 36.6], ["宮城県", "東北", "仙台市", 68.7, 45.0], ["秋田県", "東北", "秋田市", 63.7, 37.5], ["山形県", "東北", "山形市", 64.7, 45.0], ["福島県", "東北", "福島市", 65.7, 52.2], ["茨城県", "関東", "水戸市", 66.4, 61.4], ["栃木県", "関東", "宇都宮市", 62.8, 58.5], ["群馬県", "関東", "前橋市", 59.5, 58.8], ["埼玉県", "関東", "さいたま市", 61.8, 62.7], ["千葉県", "関東", "千葉市", 66.8, 66.8], ["東京都", "関東", "新宿区", 62.6, 66.0], ["神奈川県", "関東", "横浜市", 61.2, 68.7], ["新潟県", "中部", "新潟市", 56.8, 49.8], ["富山県", "中部", "富山市", 49.8, 55.8], ["石川県", "中部", "金沢市", 45.7, 58.3], ["福井県", "中部", "福井市", 43.6, 62.0], ["山梨県", "中部", "甲府市", 57.9, 65.6], ["長野県", "中部", "長野市", 54.2, 61.0], ["岐阜県", "中部", "岐阜市", 48.8, 65.4], ["静岡県", "中部", "静岡市", 56.6, 70.0], ["愛知県", "中部", "名古屋市", 50.5, 70.2], ["三重県", "近畿", "津市", 46.9, 72.8], ["滋賀県", "近畿", "大津市", 45.5, 66.6], ["京都府", "近畿", "京都市", 42.1, 66.0], ["大阪府", "近畿", "大阪市", 40.2, 70.5], ["兵庫県", "近畿", "神戸市", 36.5, 67.4], ["奈良県", "近畿", "奈良市", 43.2, 71.7], ["和歌山県", "近畿", "和歌山市", 40.5, 76.6], ["鳥取県", "中国", "鳥取市", 31.0, 63.5], ["島根県", "中国", "松江市", 26.2, 63.7], ["岡山県", "中国", "岡山市", 31.1, 69.2], ["広島県", "中国", "広島市", 26.5, 70.2], ["山口県", "中国", "山口市", 19.2, 72.4], ["徳島県", "四国", "徳島市", 35.7, 77.0], ["香川県", "四国", "高松市", 32.0, 74.2], ["愛媛県", "四国", "松山市", 26.5, 77.8], ["高知県", "四国", "高知市", 30.6, 82.0], ["福岡県", "九州・沖縄", "福岡市", 13.8, 76.3], ["佐賀県", "九州・沖縄", "佐賀市", 10.8, 78.9], ["長崎県", "九州・沖縄", "長崎市", 8.7, 81.3], ["熊本県", "九州・沖縄", "熊本市", 11.6, 84.4], ["大分県", "九州・沖縄", "大分市", 16.2, 81.5], ["宮崎県", "九州・沖縄", "宮崎市", 15.1, 89.0], ["鹿児島県", "九州・沖縄", "鹿児島市", 10.9, 91.4], ["沖縄県", "九州・沖縄", "那覇市", 79.5, 74.8]];
let mode = "home";
let current = null;
let used = new Set();
let correct = Number(localStorage.getItem("tdfk_correct") || 0);
let total = Number(localStorage.getItem("tdfk_total") || 0);
let weak = new Set(JSON.parse(localStorage.getItem("tdfk_weak") || "[]"));

const map = document.getElementById("map");
const question = document.getElementById("question");
const message = document.getElementById("message");

function save() {
  localStorage.setItem("tdfk_correct", String(correct));
  localStorage.setItem("tdfk_total", String(total));
  localStorage.setItem("tdfk_weak", JSON.stringify(Array.from(weak)));
}

function updateStats() {
  document.getElementById("correct").textContent = correct;
  document.getElementById("total").textContent = total;
  document.getElementById("rate").textContent = total ? Math.round(correct / total * 100) + "%" : "0%";
  document.getElementById("weakCount").textContent = weak.size;
}

function clearMarks() {
  document.querySelectorAll(".pin").forEach(function(pin) {
    pin.classList.remove("hit", "miss", "learn");
  });
}

function getPool() {
  let arr = prefs;
  const selectedRegion = document.getElementById("region").value;
  if (mode === "weak") {
    arr = prefs.filter(function(p) { return weak.has(p[0]); });
  } else if (selectedRegion !== "全国") {
    arr = prefs.filter(function(p) { return p[1] === selectedRegion; });
  }
  return arr;
}

function nextQuestion() {
  clearMarks();
  const arr = getPool();
  if (arr.length === 0) {
    current = null;
    question.textContent = mode === "weak" ? "苦手県はまだありません" : "問題がありません";
    message.textContent = mode === "weak" ? "間違えた県がここにたまります。" : "";
    message.className = "";
    return;
  }

  let remaining = arr.filter(function(p) { return !used.has(p[0]); });
  if (remaining.length === 0) {
    used = new Set();
    remaining = arr;
  }

  current = remaining[Math.floor(Math.random() * remaining.length)];
  used.add(current[0]);
  question.textContent = "「" + current[0] + "」はどこ？";
  message.textContent = "県庁所在地：" + current[2];
  message.className = "";
}

function answer(pref, button) {
  if (mode === "learn") {
    clearMarks();
    button.classList.add("learn");
    question.textContent = pref[0];
    message.textContent = pref[1] + "／県庁所在地：" + pref[2];
    message.className = "";
    return;
  }

  if (!current) {
    question.textContent = "先にクイズを始めてね";
    return;
  }

  total += 1;
  if (pref[0] === current[0]) {
    correct += 1;
    weak.delete(pref[0]);
    button.classList.add("hit");
    message.textContent = "○ 正解！";
    message.className = "ok";
    save();
    updateStats();
    setTimeout(nextQuestion, 650);
  } else {
    weak.add(current[0]);
    button.classList.add("miss");
    message.textContent = "× ここは「" + pref[0] + "」。正解は「" + current[0] + "」";
    message.className = "ng";
    save();
    updateStats();
  }
}

prefs.forEach(function(pref) {
  const btn = document.createElement("button");
  btn.className = "pin";
  btn.style.left = pref[3] + "%";
  btn.style.top = pref[4] + "%";
  btn.setAttribute("aria-label", pref[0]);

  const label = document.createElement("span");
  label.className = "label";
  label.textContent = pref[0];
  btn.appendChild(label);

  btn.addEventListener("click", function() {
    answer(pref, btn);
  });

  map.appendChild(btn);

  const chip = document.createElement("div");
  chip.className = "chip";
  chip.textContent = pref[0] + "｜" + pref[2];
  document.getElementById("prefList").appendChild(chip);
});

document.getElementById("startBtn").addEventListener("click", function() {
  mode = "quiz";
  used = new Set();
  nextQuestion();
});

document.getElementById("learnBtn").addEventListener("click", function() {
  mode = "learn";
  current = null;
  clearMarks();
  question.textContent = "地図をタップして県名を確認";
  message.textContent = "学習モード";
  message.className = "";
});

document.getElementById("weakBtn").addEventListener("click", function() {
  mode = "weak";
  used = new Set();
  nextQuestion();
});

document.getElementById("labelsBtn").addEventListener("click", function() {
  map.classList.toggle("showLabels");
});

document.getElementById("nextBtn").addEventListener("click", function() {
  if (mode === "home") mode = "quiz";
  nextQuestion();
});

document.getElementById("region").addEventListener("change", function() {
  if (mode !== "learn") {
    mode = "quiz";
    used = new Set();
    nextQuestion();
  }
});

document.getElementById("resetBtn").addEventListener("click", function() {
  if (confirm("記録を消しますか？")) {
    correct = 0;
    total = 0;
    weak = new Set();
    used = new Set();
    save();
    updateStats();
    clearMarks();
    question.textContent = "記録をリセットしました";
    message.textContent = "";
  }
});

updateStats();
</script>
</body>
</html>
